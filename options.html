<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>GPTPulse Options</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1115;
      color: #f5f7fa;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    .muted {
      color: rgba(255,255,255,0.7);
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: #171a21;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px;
    }

    .card h2 {
      margin: 0 0 14px;
      font-size: 17px;
    }

    label {
      display: block;
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      margin-bottom: 8px;
    }

    input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.14);
      background: #11141a;
      color: #fff;
      font-size: 14px;
    }

    input[type="range"] {
      width: 100%;
      margin: 10px 0 0;
      accent-color: #fff;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .row:last-child {
      margin-bottom: 0;
    }

    button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.14);
      background: #232834;
      color: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #2b3240;
    }

    .status {
      margin-top: 18px;
      font-size: 13px;
      color: rgba(255,255,255,0.85);
      min-height: 20px;
    }

    .small {
      font-size: 12px;
      color: rgba(255,255,255,0.65);
      line-height: 1.5;
    }

    .switch {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
    }

    .switch input {
      transform: scale(1.1);
    }

    .value {
      font-weight: 700;
      color: #fff;
      min-width: 42px;
      text-align: right;
    }

    .range-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>GPTPulse</h1>
    <div class="muted">Show only the last N messages in ChatGPT.</div>

    <div class="grid">
      <section class="card">
        <h2>Visible messages</h2>

        <div class="range-head">
          <label for="maxVisibleMessages" style="margin:0;">Visible message limit</label>
          <div class="value" id="maxVisibleValue">10</div>
        </div>

        <input id="maxVisibleMessages" type="range" min="1" max="200" step="1" value="10">
        <div style="margin-top: 10px;">
          <input id="maxVisibleNumber" type="number" min="1" max="200" step="1" value="10">
        </div>

        <div class="small" style="margin-top: 12px;">
          Default is 10. Older messages stay in the page and are only hidden on your side.
        </div>

        <div style="margin-top: 14px;">
          <button id="saveSettings" type="button">Save settings</button>
        </div>
      </section>

      <section class="card">
        <h2>Overlay</h2>

        <div class="row">
          <label class="switch">
            <input id="overlayVisible" type="checkbox">
            <span>Show overlay in ChatGPT</span>
          </label>
        </div>

        <div class="small">
          Logging support was removed to keep GPTPulse focused and simple.
        </div>
      </section>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
